<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alkenegram | Ultra</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0095f6; --bg: #fafafa; --c: #fff; --t: #262626; --b: #dbdbdb; --red: #ff3040; }
        body.dark { --bg: #000; --c: #121212; --t: #f5f5f5; --b: #262626; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--t); margin: 0; overflow-x: hidden; width: 100vw; }
        
        /* Layout Fixes */
        .nav { background: var(--c); border-bottom: 1px solid var(--b); height: 60px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; width: 100%; }
        .nav-in { width: 100%; max-width: 500px; display: flex; justify-content: space-between; padding: 0 15px; align-items: center; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; }

        /* Profile & Action Bar */
        .profile-card { background: var(--c); border: 1px solid var(--b); border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .p-avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--p); object-fit: cover; }

        /* Posts */
        .post { background: var(--c); border: 1px solid var(--b); border-radius: 12px; margin-bottom: 20px; overflow: hidden; width: 100%; }
        .post-h { padding: 12px; display: flex; align-items: center; justify-content: space-between; font-weight: 600; }
        .post-img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .post-f { padding: 12px; }
        .post-actions { display: flex; gap: 15px; margin-bottom: 8px; align-items: center; }
        .like-btn { font-size: 24px; cursor: pointer; background: none; border: none; padding: 0; transition: transform 0.1s; }
        .like-btn.active { color: var(--red); transform: scale(1.2); }

        /* Modals (New Windows) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--c); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; max-height: 200px; overflow-y: auto; padding: 5px; }
        .av-opt { width: 100%; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .av-opt.active { border-color: var(--p); }
        
        /* UI Elements */
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--b); border-radius: 8px; background: var(--bg); color: var(--t); margin-bottom: 10px; font-family: inherit; }
        .btn-p { background: var(--p); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; }
        .del { color: #8e8e8e; background: none; border: none; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<div class="nav">
    <div class="nav-in">
        <span style="font-weight: 900; font-size: 1.4rem; letter-spacing: -1px;">ALKENEGRAM</span>
        <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:20px;">🌓</button>
    </div>
</div>

<div class="container">
    <div class="profile-card">
        <img id="display-avatar" class="p-avatar" src="">
        <div style="flex:1">
            <h3 id="display-name" style="margin:0"></h3>
            <button onclick="openSettings()" style="background:none; border:none; color:var(--p); padding:0; font-size:12px; font-weight:600; cursor:pointer;">Edit Profile</button>
        </div>
        <button class="btn-p" onclick="document.getElementById('file-in').click()" style="width:auto; padding: 8px 15px;">+ Post</button>
    </div>
    <input type="file" id="file-in" style="display:none" accept="image/*">
    <div id="feed"></div>
</div>

<div id="post-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">New Post</h3>
        <div id="preview-container"></div>
        <textarea id="caption-input" placeholder="Write a caption..." rows="3"></textarea>
        <button class="btn-p" id="final-post-btn">Share Post</button>
        <button onclick="closePostModal()" style="width:100%; background:none; border:none; margin-top:10px; color:gray; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="settings-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">Settings</h3>
        <input type="text" id="name-input" placeholder="Your Name">
        <div class="avatar-grid" id="avatar-picker"></div>
        <button class="btn-p" onclick="saveSettings()">Save Changes</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, deleteDoc, updateDoc, increment, doc, query, onSnapshot, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyASOOxf4lFXrTs9XWmXNCC-UHHsR1HAoJU",
        authDomain: "alkene-95242.firebaseapp.com",
        projectId: "alkene-95242",
        storageBucket: "alkene-95242.firebasestorage.app",
        messagingSenderId: "1345856069",
        appId: "1:1345856069:web:ad3de9c66ab3c58ab5f92c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Audio Effects
    const pop = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
    const snapSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3');

    let userData = {
        name: localStorage.getItem('alkene_name') || "Guest",
        avatar: localStorage.getItem('alkene_avatar') || "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"
    };

    // 16 Avatars
    const seeds = ['Felix', 'Aneka', 'Max', 'Luna', 'Jack', 'Milo', 'Kiki', 'Jasper', 'Bella', 'Zoe', 'Leo', 'Coco', 'Ruby', 'Oscar', 'Toby', 'Sasha'];

    onAuthStateChanged(auth, async (user) => {
        if (!user) await signInAnonymously(auth);
        document.getElementById('display-name').innerText = userData.name;
        document.getElementById('display-avatar').src = userData.avatar;
        loadFeed();
    });

    // --- POSTING FLOW ---
    let tempImageData = "";
    document.getElementById('file-in').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (ev) => {
            const img = new Image();
            img.src = ev.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 1080; canvas.height = (img.height/img.width)*1080;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                tempImageData = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('post-modal').style.display = 'flex';
                document.getElementById('preview-container').innerHTML = `<img src="${tempImageData}" style="width:100%; border-radius:10px; margin-bottom:10px;">`;
                pop.play();
            };
        };
    };

    document.getElementById('final-post-btn').onclick = async () => {
        const cap = document.getElementById('caption-input').value;
        document.getElementById('final-post-btn').innerText = "Uploading...";
        await addDoc(collection(db, "posts"), {
            image: tempImageData,
            author: userData.name,
            avatar: userData.avatar,
            caption: cap || "",
            likes: 0,
            createdAt: serverTimestamp()
        });
        snapSfx.play();
        closePostModal();
    };

    window.closePostModal = () => {
        document.getElementById('post-modal').style.display = 'none';
        document.getElementById('caption-input').value = "";
        document.getElementById('final-post-btn').innerText = "Share Post";
    };

    // --- LIKES ---
    window.likePost = async (id) => {
        const likedKey = `liked_${id}`;
        if(localStorage.getItem(likedKey)) return;
        localStorage.setItem(likedKey, "true");
        pop.play();
        await updateDoc(doc(db, "posts", id), { likes: increment(1) });
    };

    // --- SETTINGS ---
    window.openSettings = () => {
        document.getElementById('settings-modal').style.display = 'flex';
        document.getElementById('name-input').value = userData.name;
        const picker = document.getElementById('avatar-picker');
        picker.innerHTML = '';
        seeds.forEach(s => {
            const url = `https://api.dicebear.com/7.x/avataaars/svg?seed=${s}`;
            picker.innerHTML += `<img src="${url}" class="av-opt ${userData.avatar==url?'active':''}" onclick="setAvatar('${url}')">`;
        });
    };

    window.setAvatar = (url) => {
        userData.avatar = url;
        openSettings(); // Refresh picker
    };

    window.saveSettings = () => {
        userData.name = document.getElementById('name-input').value;
        localStorage.setItem('alkene_name', userData.name);
        localStorage.setItem('alkene_avatar', userData.avatar);
        location.reload();
    };

    window.toggleTheme = () => {
        const isDark = document.body.classList.toggle('dark');
        localStorage.setItem('alkene_theme', isDark ? 'dark' : 'light');
    };
    if(localStorage.getItem('alkene_theme') === 'dark') document.body.classList.add('dark');

    // --- FEED ---
    function loadFeed() {
        const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                const isMe = p.author === userData.name;
                const hasLiked = localStorage.getItem(`liked_${d.id}`);
                feed.innerHTML += `
                    <div class="post">
                        <div class="post-h">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <img src="${p.avatar}" style="width:32px; height:32px; border-radius:50%">
                                <span>${p.author}</span>
                            </div>
                            ${isMe ? `<button class="del" onclick="deletePost('${d.id}')">Delete</button>` : ''}
                        </div>
                        <img src="${p.image}" class="post-img" ondblclick="likePost('${d.id}')">
                        <div class="post-f">
                            <div class="post-actions">
                                <button class="like-btn ${hasLiked?'active':''}" onclick="likePost('${d.id}')">❤️</button>
                                <span style="font-weight:bold; font-size:14px;">${p.likes || 0} likes</span>
                            </div>
                            <strong>${p.author}</strong> ${p.caption}
                        </div>
                    </div>`;
            });
        });
    }

    window.deletePost = async (id) => { if(confirm("Delete post?")) await deleteDoc(doc(db, "posts", id)); };
</script>
</body>
</html>
